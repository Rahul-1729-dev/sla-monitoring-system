<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLA Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="navbar-brand">SLA Dashboard</a>
    <a href="index.html" class="btn-ghost">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Home
    </a>
  </div>
</nav>

<div class="container mt-4 pb-5">

  <!-- Stat cards row 1 -->
  <div class="row g-3 mb-3">

    <div class="col-6 col-md-3 fade-up stagger-1">
      <div class="card card-stat">
        <div class="card-icon">📡</div>
        <div class="card-label">Status</div>
        <div id="status"><span class="status-badge up">OPERATIONAL</span></div>
      </div>
    </div>

    <div class="col-6 col-md-3 fade-up stagger-2">
      <div class="card card-stat">
        <div class="card-icon">📈</div>
        <div class="card-label">Uptime</div>
        <div class="card-value green" id="uptime">0%</div>
      </div>
    </div>

    <div class="col-6 col-md-3 fade-up stagger-3">
      <div class="card card-stat">
        <div class="card-icon">🔢</div>
        <div class="card-label">Total Checks</div>
        <div class="card-value" id="checks">0</div>
      </div>
    </div>

    <div class="col-6 col-md-3 fade-up stagger-4">
      <div class="card card-stat">
        <div class="card-icon">⚠️</div>
        <div class="card-label">Downtime</div>
        <div class="card-value red" id="downtime">0</div>
      </div>
    </div>

  </div>

  <!-- Balance cards row 2 -->
  <div class="row g-3 mb-4">

    <div class="col-md-4 fade-up stagger-5">
      <div class="card card-stat">
        <div class="card-icon">🏦</div>
        <div class="card-label">Contract Balance</div>
        <div class="card-value accent" id="contractBalance">— ETH</div>
      </div>
    </div>

    <div class="col-md-4 fade-up stagger-6">
      <div class="card card-stat">
        <div class="card-icon">🛠️</div>
        <div class="card-label">Provider Balance</div>
        <div class="card-value accent" id="providerBalance">— ETH</div>
      </div>
    </div>

    <div class="col-md-4 fade-up stagger-7">
      <div class="card card-stat">
        <div class="card-icon">👤</div>
        <div class="card-label">Client Balance</div>
        <div class="card-value accent" id="clientBalance">— ETH</div>
      </div>
    </div>

  </div>

  <!-- SLA details -->
  <div class="fade-up stagger-8">
    <div class="card">
      <div class="section-title">SLA Details</div>

      <div class="detail-row">
        <span class="detail-label">Website</span>
        <span class="detail-value" id="website">—</span>
      </div>

      <div class="detail-row">
        <span class="detail-label">Provider</span>
        <span class="detail-value addr" id="provider">—</span>
      </div>

      <div class="detail-row">
        <span class="detail-label">Client</span>
        <span class="detail-value addr" id="client">—</span>
      </div>

      <div class="detail-row">
        <span class="detail-label">Penalty</span>
        <span class="detail-value" id="penalty">—</span>&nbsp;<span class="detail-value" style="color:var(--muted)">ETH</span>
      </div>

      <div class="detail-row">
        <span class="detail-label">Penalty Status</span>
        <span class="detail-value" id="penaltyStatus">—</span>
      </div>

    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>
<script>
  // Animate numbers counting up when values are set
  function animateCount(el, target, decimals = 0, suffix = '') {
    const start = 0;
    const duration = 900;
    const startTime = performance.now();
    function step(now) {
      const p = Math.min((now - startTime) / duration, 1);
      const val = (p * target).toFixed(decimals);
      el.textContent = val + suffix;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // Observe mutations to #uptime, #checks, #downtime for counter animation
  const watchIds = ['checks', 'downtime'];
  watchIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const obs = new MutationObserver(() => {
      const raw = parseFloat(el.textContent);
      if (!isNaN(raw) && raw > 0) { animateCount(el, raw, 0, ''); obs.disconnect(); }
    });
    obs.observe(el, { childList: true, characterData: true, subtree: true });
  });

  const uptimeEl = document.getElementById('uptime');
  if (uptimeEl) {
    const obs = new MutationObserver(() => {
      const raw = parseFloat(uptimeEl.textContent);
      if (!isNaN(raw) && raw > 0) { animateCount(uptimeEl, raw, 1, '%'); obs.disconnect(); }
    });
    obs.observe(uptimeEl, { childList: true, characterData: true, subtree: true });
  }

  // Status badge helper (callable from dashboard.js)
  window.setStatusBadge = function(isUp) {
    const el = document.getElementById('status');
    if (!el) return;
    el.innerHTML = isUp
      ? '<span class="status-badge up">OPERATIONAL</span>'
      : '<span class="status-badge down">DEGRADED</span>';
  };
</script>

</body>
</html>
