<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

  <div class="container">

    <a class="navbar-brand">
      SLA Dashboard
    </a>

    <a href="index.html" class="btn btn-light">
      Home
    </a>

  </div>

</nav>

<div class="container mt-4">

  <div class="row g-4">

    <div class="col-md-3">
      <div class="card p-3">
        <h5>Status</h5>
        <h2 id="status">Loading...</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3">
        <h5>Uptime %</h5>
        <h2 id="uptime">0%</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3">
        <h5>Total Checks</h5>
        <h2 id="checks">0</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3">
        <h5>Downtime</h5>
        <h2 id="downtime">0</h2>
      </div>
    </div>

  </div>

  <div class="row mt-4 g-4">

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Contract Balance</h5>
        <h3 id="contractBalance">0 ETH</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Provider Balance</h5>
        <h3 id="providerBalance">0 ETH</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Client Balance</h5>
        <h3 id="clientBalance">0 ETH</h3>
      </div>
    </div>

  </div>

  <div class="row mt-4">

    <div class="col-md-12">

      <div class="card p-4">

        <h4>SLA Details</h4>

        <p>
          <b>Website:</b>
          <span id="website"></span>
        </p>

        <p>
          <b>Provider:</b>
          <span id="provider"></span>
        </p>

        <p>
          <b>Client:</b>
          <span id="client"></span>
        </p>

        <p>
          <b>Penalty:</b>
          <span id="penalty"></span> ETH
        </p>

        <p>
          <b>Penalty Status:</b>
          <span id="penaltyStatus"></span>
        </p>

      </div>

    </div>

  </div>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
