<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLA Monitoring System</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container">

    <a class="navbar-brand">
      SLA Monitoring System
    </a>

    <button class="btn btn-light" id="connectBtn">
      Connect MetaMask
    </button>

  </div>
</nav>

<div class="container mt-5">

  <div class="row">

    <div class="col-md-8 mx-auto">

      <div class="card p-4">

        <h2 class="mb-4 text-center">
          Blockchain SLA Monitoring
        </h2>

        <p>
          Monitor real-world website uptime using blockchain.
        </p>

        <p>
          If uptime drops below 95%, penalty ETH automatically transfers to the client.
        </p>

        <hr>

        <div class="d-grid gap-3">

          <a href="dashboard.html" class="btn btn-primary">
            Open Dashboard
          </a>

          <a href="logs.html" class="btn btn-dark">
            View Logs
          </a>

        </div>

        <hr>

        <div class="wallet-box">

          <h5>Wallet Address</h5>

          <small id="walletAddress">
            Not Connected
          </small>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="js/config.js"></script>
<script src="js/index.js"></script>

</html>
