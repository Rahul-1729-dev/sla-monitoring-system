<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLA Monitoring System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="navbar-brand">SLA Monitor</a>
    <button class="btn-connect" id="connectBtn">
      <span class="btn-dot"></span>
      Connect MetaMask
    </button>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

      <div class="card hero-card fade-up stagger-1">
        <div class="hero-glow"></div>

        <div class="d-flex align-items-center gap-2 mb-4">
          <span class="feature-chip"><span class="chip-dot"></span> Ethereum Mainnet</span>
          <span class="feature-chip"><span class="chip-dot"></span> Live Monitoring</span>
        </div>

        <h2 class="hero-title">Blockchain<br>SLA Monitoring</h2>

        <p class="hero-desc mb-1">
          Monitor real-world website uptime secured on-chain.
        </p>
        <p class="hero-desc mb-4">
          Uptime below <span style="color:var(--accent2)">95%</span> triggers automatic penalty transfer to the client.
        </p>

        <hr class="divider">

        <div class="d-flex flex-column gap-2 mb-4">
          <a href="dashboard.html" class="btn-primary-custom">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Open Dashboard
          </a>
          <a href="logs.html" class="btn-dark-custom">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            View Logs
          </a>
        </div>

        <hr class="divider">

        <div class="wallet-box" id="walletBox">
          <div class="wallet-icon">🦊</div>
          <div>
            <div class="wallet-label">Wallet Address</div>
            <div class="wallet-addr" id="walletAddress">Not Connected</div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/index.js"></script>
<script>
  // Enhance connect button with visual state
  const btn = document.getElementById('connectBtn');
  if (btn) {
    btn.addEventListener('click', () => {
      btn.classList.toggle('connected');
    });
  }
</script>

</body>
</html>
