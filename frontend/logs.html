<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="navbar-brand">Monitoring Logs</a>
    <a href="index.html" class="btn-ghost">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Home
    </a>
  </div>
</nav>

<div class="container mt-4 pb-5 fade-up stagger-1">
  <div class="card">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div class="section-title" style="margin-bottom:0">Website Monitoring Logs</div>
      <span class="feature-chip" id="logCount">
        <span class="chip-dot"></span>
        0 entries
      </span>
    </div>

    <div class="table-responsive">
      <table class="log-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Status</th>
            <th>Response Time</th>
          </tr>
        </thead>
        <tbody id="logsTable">
          <!-- rows injected by logs.js -->
        </tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div id="emptyState" style="text-align:center; padding:40px 0; display:none;">
      <div style="font-size:2rem; margin-bottom:8px; opacity:0.4">📭</div>
      <div class="section-title" style="margin:0">No logs yet</div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/logs.js"></script>
<script>
  // Observe table for rows being added & animate them + update count
  const tbody = document.getElementById('logsTable');
  const countEl = document.getElementById('logCount');
  const empty = document.getElementById('emptyState');

  if (tbody) {
    const obs = new MutationObserver(() => {
      const rows = tbody.querySelectorAll('tr');
      rows.forEach(r => {
        if (!r.classList.contains('fade-in')) r.classList.add('fade-in');
      });
      const n = rows.length;
      if (countEl) countEl.innerHTML = `<span class="chip-dot"></span> ${n} entr${n === 1 ? 'y' : 'ies'}`;
      if (empty) empty.style.display = n === 0 ? 'block' : 'none';
    });
    obs.observe(tbody, { childList: true });

    // Initial empty check
    if (tbody.querySelectorAll('tr').length === 0 && empty) {
      empty.style.display = 'block';
    }
  }

  // Style log rows — helper for logs.js if it writes raw HTML with .status-up / .status-down spans
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.status-up').forEach(el => {
      el.innerHTML = '<span class="status-badge up">UP</span>';
    });
    document.querySelectorAll('.status-down').forEach(el => {
      el.innerHTML = '<span class="status-badge down">DOWN</span>';
    });
  });
</script>

</body>
</html>
